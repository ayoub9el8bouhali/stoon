<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Créer un compte | STOON</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <link rel="stylesheet" href="/css/chatbot.css">
  </head>
  <body>
    <main class="auth-shell d-flex align-items-center justify-content-center p-3 py-5">
      <section class="card auth-card auth-card-wide p-4 p-md-5">
        <a href="/"><img src="/assets/stoon-logo.svg" width="180" alt="STOON"></a>
        <h1 class="fw-bold mt-4">Créer mon compte</h1>
        <p class="text-secondary">Rejoignez la communauté étudiante STOON.</p>
        <form id="register-form" class="row g-3">
          <label class="col-md-6">Prénom<input class="form-control mt-1" name="firstName" autocomplete="given-name" required minlength="2"></label>
          <label class="col-md-6">Nom<input class="form-control mt-1" name="lastName" autocomplete="family-name" required minlength="2"></label>
          <label class="col-12">Email<input class="form-control mt-1" type="email" name="email" autocomplete="email" required></label>
          <label class="col-12">Mot de passe<input class="form-control mt-1" type="password" name="password" autocomplete="new-password" minlength="8" required></label>
          <label class="col-md-6">Ville<input class="form-control mt-1" name="city" required minlength="2"></label>
          <label class="col-md-6">École<input class="form-control mt-1" name="school" required minlength="2"></label>
          <label class="col-12">Filière<input class="form-control mt-1" name="fieldOfStudy" required minlength="2"></label>
          <label class="col-12">Présentation (facultatif)<textarea class="form-control mt-1" name="bio" rows="3"></textarea></label>
          <p id="feedback" class="col-12 text-danger mb-0" aria-live="polite"></p>
          <div class="col-12 d-grid"><button class="btn btn-stoon" type="submit">Créer mon compte</button></div>
          <p class="col-12 text-center mb-0">Déjà inscrit ? <a href="/pages/login.html">Se connecter</a></p>
        </form>
      </section>
    </main>
    <script type="module" src="/js/register.js"></script>
    <script src="/js/chatbot.js"></script>
  </body>
</html>
