<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mon profil | STOON</title>
  <link rel="icon" type="image/svg+xml" href="/assets/stoon-favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css"><link rel="stylesheet" href="/css/chatbot.css">
</head>
<body>
  <nav class="account-nav border-bottom"><div class="container" id="account-nav"></div></nav>
  <header class="page-hero"><div class="container"><h1>Mon profil</h1><p>Mettez à jour les informations visibles par la communauté STOON.</p></div></header>
  <main class="container py-5"><form id="profile-form" class="form-panel row g-3">
    <label class="col-md-6">Prénom<input class="form-control mt-1" name="firstName" required></label>
    <label class="col-md-6">Nom<input class="form-control mt-1" name="lastName" required></label>
    <label class="col-md-6">Ville<input class="form-control mt-1" name="city" required></label>
    <label class="col-md-6">École<input class="form-control mt-1" name="school" required></label>
    <label class="col-12">Filière<input class="form-control mt-1" name="fieldOfStudy" required></label>
    <label class="col-12">Présentation<textarea class="form-control mt-1" name="bio" rows="4"></textarea></label>
    <div id="feedback" class="col-12" aria-live="polite"></div>
    <div class="col-12"><button class="btn btn-stoon" type="submit">Enregistrer les modifications</button></div>
  </form></main>
  <script type="module" src="/js/profile.js"></script><script src="/js/chatbot.js"></script>
</body>
</html>
