<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Profil étudiant | STOON</title>
  <link rel="icon" type="image/svg+xml" href="/assets/stoon-favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css"><link rel="stylesheet" href="/css/chatbot.css">
</head>
<body>
  <nav class="navbar bg-white border-bottom"><div class="container"><a class="navbar-brand brand-box" href="/"><img src="/assets/stoon-logo.svg" alt="STOON"></a><a class="btn btn-outline-stoon" href="/">Accueil</a></div></nav>
  <main class="container py-5">
    <section id="public-profile" class="profile-public mb-5"><p>Chargement du profil...</p></section>
    <div class="row g-4">
      <section class="col-lg-7"><h2 class="section-title">Avis et commentaires de la communauté</h2><div id="reviews" class="review-list"></div></section>
      <section class="col-lg-5"><form id="review-form" class="form-panel"><h2>Donner un avis</h2>
        <label>Note<select class="form-select mt-1 mb-3" name="rating"><option value="5">5 - Excellent</option><option value="4">4 - Très bien</option><option value="3">3 - Bien</option><option value="2">2 - Moyen</option><option value="1">1 - Mauvais</option></select></label>
        <label>Commentaire<textarea class="form-control mt-1" name="comment" rows="4" required minlength="4"></textarea></label>
        <div id="feedback" class="mt-3"></div><button class="btn btn-stoon mt-3" type="submit">Publier l’avis</button>
      </form></section>
    </div>
  </main>
  <script type="module" src="/js/user-profile.js"></script><script src="/js/chatbot.js"></script>
</body>
</html>
