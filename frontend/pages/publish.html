<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Publier une offre | STOON</title>
  <link rel="icon" type="image/svg+xml" href="/assets/stoon-favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css"><link rel="stylesheet" href="/css/chatbot.css">
</head>
<body>
  <nav class="account-nav border-bottom"><div class="container" id="account-nav"></div></nav>
  <header class="page-hero"><div class="container"><h1>Publier une offre</h1><p>Partagez un logement, un trajet, un document ou une opportunité.</p></div></header>
  <main class="container py-5">
    <div class="publish-types" id="publish-types">
      <button class="active" data-type="housing" type="button">🏠 Colocation</button>
      <button data-type="ride" type="button">🚗 Covoiturage</button>
      <button data-type="job" type="button">💼 Stage & Job</button>
      <button data-type="document" type="button">📄 Document</button>
    </div>
    <form id="publish-form" class="form-panel mt-4">
      <div id="form-fields" class="row g-3"></div>
      <div id="feedback" class="mt-3" aria-live="polite"></div>
      <div class="d-flex flex-wrap gap-2 mt-4">
        <button class="btn btn-stoon" type="submit">Publier l’offre</button>
        <a class="btn btn-outline-stoon" href="/pages/my-publications.html">Voir mes publications</a>
      </div>
    </form>
  </main>
  <script type="module" src="/js/publish.js"></script><script src="/js/chatbot.js"></script>
</body>
</html>
