services:
  app:
    build: .
    container_name: stoon_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: ${FRONTEND_URL}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      UPLOAD_MAX_SIZE_MB: ${UPLOAD_MAX_SIZE_MB:-8}
      PYTHON_BIN: python3
      STOON_CHATBOT_KNOWLEDGE: /app/data/connaissances.json
      STOON_CHATBOT_HISTORY: /app/data/historique.txt
    ports:
      - "${APP_PORT:-5001}:5000"
    volumes:
      - stoon_uploads:/app/backend/uploads
      - stoon_chatbot_data:/app/data

  mysql:
    image: mysql:8.4
    container_name: stoon_mysql_prod
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - stoon_mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./backend/database/academic_schema.sql:/docker-entrypoint-initdb.d/03-academic-schema.sql:ro
      - ./backend/database/academic_seed.sql:/docker-entrypoint-initdb.d/04-academic-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:5
    container_name: stoon_phpmyadmin_prod
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"

volumes:
  stoon_mysql_data:
  stoon_uploads:
  stoon_chatbot_data:
